apiVersion: apps/v1
kind: Deployment
metadata:
  name: watertank
spec:
  selector:
    matchLabels:
      app: watertank
  replicas: 1
  template:
    metadata:
      labels:
        app: watertank
    spec:
      containers:
        - image: docker.io/rmoorewrs/watertank:latest
          name: watertank
          ports:
            - containerPort: 5050
              protocol: TCP
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: watertank
spec:
  type: NodePort
  selector:
    app: watertank
  ports:
    - name: "5050"
      port: 5050
      targetPort: 5050
      nodePort: 30050
---
