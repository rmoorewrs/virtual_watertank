apiVersion: apps/v1
kind: Deployment
metadata:
  name: watertank
spec:
  replicas: 1
  template:
    metadata:
    spec:
      containers:
        - image: docker.io/rmoorewrs/watertank:latest
          name: watertank
          ports:
            - containerPort: 5050
              protocol: TCP
      restartPolicy: Always
