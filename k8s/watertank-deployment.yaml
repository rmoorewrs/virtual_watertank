apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: watertank
  name: watertank
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: watertank
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: watertank
    spec:
      containers:
        - image: watertank:latest
          name: watertank
          ports:
            - containerPort: 5050
              protocol: TCP
      restartPolicy: Always
